<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | ChorusTrace</title>
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <div id="chorustrace-preflight-status" data-state="shell" data-interaction-seen="false" data-pending-interaction-count="0" data-audio-state="unknown" data-audio-unlock-source="none" data-ui-screen="unknown" data-game-mode="none" data-help-visible="false" data-guide-count="0" data-level-seed="" data-preflight-phase="boot" data-status-code="idle" data-status-text="" data-tutorial-index="-1" data-instruction-text="" data-is-drawing="false" data-committed-gesture-count="0" data-shell-loaded-ms="" data-loader-requested-ms="" data-unity-booted-ms="" data-first-playable-board-ms="" data-first-committed-gesture-ms="" hidden></div>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-loading-bar" role="status" aria-live="polite" aria-hidden="false">
        <div id="unity-logo">
          <div id="chorus-loading-title">Chorus Trace</div>
        </div>
        <div id="chorus-loading-status">Preparing the chamber.</div>
        <div id="chorus-loading-helper">A short ritual is waking the board.</div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"></div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer">Unity Web</div>
        <div id="unity-fullscreen-button" aria-label="Fullscreen"></div>
        <div id="unity-build-title">ChorusTrace</div>
      </div>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var chorusTracePreflightNode = document.querySelector("#chorustrace-preflight-status");
      var chorusTraceLoadingBar = document.querySelector("#unity-loading-bar");
      var chorusTraceLoadingStatus = document.querySelector("#chorus-loading-status");
      var chorusTraceLoadingHelper = document.querySelector("#chorus-loading-helper");
      var chorusTracePreflightParams = new URLSearchParams(window.location.search);
      var desktopAspect = 960 / 600;
      var chorusTracePreflight = {
        state: "shell",
        details: "",
        interactionSeen: false,
        pendingInteractionCount: 0,
        audioState: "unknown",
        audioUnlockSource: "none",
        uiScreen: "unknown",
        gameMode: "none",
        helpVisible: false,
        guideCount: 0,
        levelSeed: "",
        preflightPhase: "boot",
        statusCode: "idle",
        statusText: "",
        tutorialIndex: -1,
        instructionText: "",
        isDrawing: false,
        committedGestureCount: 0,
        snapshotValue: ""
      };
      var chorusTraceSmokeGeometry = null;
      var chorusTracePendingInteractionCount = 0;
      var chorusTracePendingSmokeCommands = Object.create(null);
      var chorusTraceLastSmokeCommandReceipt = null;
      var chorusTraceSmokeCommandCounter = 0;
      var chorusTraceClipboardWriteCounter = 0;
      var chorusTraceClipboardWriteState = {
        request_id: "",
        expected_text: "",
        status: "idle",
        completed: false,
        succeeded: false,
        method: "",
        failure_reason: "",
        started_at_ms: 0,
        completed_at_ms: 0
      };
      var chorusTraceUnityInstance = null;
      var chorusTraceAutoAudioUnlockEnabled = shouldReportToLocalPreflight() &&
        chorusTracePreflightParams.get("chorustrace_preflight_audio_automation") === "auto";
      var chorusTraceAutoAudioUnlockScheduled = false;
      var chorusTraceAutoAudioUnlockStartedAtMs = 0;
      var chorusTraceAutoAudioUnlockTimerId = 0;
      var chorusTraceAutoAudioUnlockAttemptIntervalMs = 250;
      var chorusTraceAutoAudioUnlockAttemptWindowMs = 10000;
      var chorusTraceLoadingShellMinimumVisibleMs = 900;
      var chorusTraceLoadingShellBootGraceMs = 1500;
      var chorusTraceLoadingShellFadeDurationMs = 220;
      var chorusTraceLoadingShellFirstShownAtMs = Date.now();
      var chorusTraceLoadingShellBootedAtMs = 0;
      var chorusTraceLoadingShellVisibilityTimerId = 0;
      var chorusTraceLoadingShellFadeTimerId = 0;
      var chorusTraceDesktopCanvasResizeRequestId = 0;
      var chorusTraceStartupTimingFallbackOriginMs = Date.now();
      var chorusTraceStartupTiming = {
        shellLoadedMs: null,
        loaderRequestedMs: null,
        unityBootedMs: null,
        firstPlayableBoardMs: null,
        firstCommittedGestureMs: null
      };

      function readChorusTraceNowMs() {
        if (window.performance && typeof window.performance.now === "function") {
          return Math.max(0, Math.round(window.performance.now()));
        }

        return Math.max(0, Date.now() - chorusTraceStartupTimingFallbackOriginMs);
      }

      function normalizeChorusTraceTimingMs(value) {
        var parsedValue = Number(value);
        if (!Number.isFinite(parsedValue) || parsedValue < 0) {
          return null;
        }

        return Math.round(parsedValue);
      }

      function markChorusTraceStartupTimingOnce(propertyName) {
        if (!Object.prototype.hasOwnProperty.call(chorusTraceStartupTiming, propertyName)) {
          return false;
        }

        if (chorusTraceStartupTiming[propertyName] !== null) {
          return false;
        }

        chorusTraceStartupTiming[propertyName] = readChorusTraceNowMs();
        return true;
      }

      function buildChorusTraceStartupTimingSnapshot() {
        return {
          shell_loaded_ms: normalizeChorusTraceTimingMs(chorusTraceStartupTiming.shellLoadedMs),
          loader_requested_ms: normalizeChorusTraceTimingMs(chorusTraceStartupTiming.loaderRequestedMs),
          unity_booted_ms: normalizeChorusTraceTimingMs(chorusTraceStartupTiming.unityBootedMs),
          first_playable_board_ms: normalizeChorusTraceTimingMs(chorusTraceStartupTiming.firstPlayableBoardMs),
          first_committed_gesture_ms: normalizeChorusTraceTimingMs(chorusTraceStartupTiming.firstCommittedGestureMs)
        };
      }

      function syncChorusTraceStartupTimingMilestones() {
        if (chorusTracePreflight.state === "loader-requested") {
          markChorusTraceStartupTimingOnce("loaderRequestedMs");
        }

        if (chorusTracePreflight.state === "unity-booted") {
          markChorusTraceStartupTimingOnce("unityBootedMs");
        }

        if (chorusTracePreflight.state === "unity-booted" &&
            chorusTracePreflight.uiScreen === "gameplay" &&
            typeof chorusTracePreflight.levelSeed === "string" &&
            chorusTracePreflight.levelSeed.length > 0) {
          markChorusTraceStartupTimingOnce("firstPlayableBoardMs");
        }

        if (chorusTraceStartupTiming.firstPlayableBoardMs !== null &&
            chorusTracePreflight.committedGestureCount > 0) {
          markChorusTraceStartupTimingOnce("firstCommittedGestureMs");
        }
      }

      markChorusTraceStartupTimingOnce("shellLoadedMs");

      function handleChorusTraceWorkerBridgeMessage(event) {
        var data = event && event.data ? event.data : null;
        if (!data || !data.__chorustrace_preflight_bridge || !data.payload) {
          return;
        }

        var payload = data.payload;
        switch (data.type) {
          case "audio-state":
            if (typeof window.ChorusTraceSetAudioPreflightState === "function") {
              window.ChorusTraceSetAudioPreflightState(payload.audioState | 0);
            }
            break;
          case "gameplay-state":
            if (typeof window.ChorusTraceSetGameplayPreflightState === "function") {
              window.ChorusTraceSetGameplayPreflightState(
                payload.uiScreen || "",
                payload.gameMode || "",
                payload.helpVisible | 0,
                payload.guideCount | 0,
                payload.levelSeed || "",
                payload.preflightPhase || "",
                payload.audioUnlockSource || "none");
            }
            break;
          case "smoke-telemetry":
            if (typeof window.ChorusTraceSetSmokeTelemetry === "function") {
              window.ChorusTraceSetSmokeTelemetry(
                payload.statusText || "",
                payload.statusCode || "idle",
                payload.isDrawing | 0,
                payload.committedGestureCount | 0,
                payload.geometryJson || "",
                payload.snapshotValue || "",
                payload.tutorialIndex | 0,
                payload.instructionText || "");
            }
            break;
          case "smoke-command-receipt":
            if (typeof window.ChorusTraceSetSmokeCommandReceipt === "function") {
              window.ChorusTraceSetSmokeCommandReceipt(payload.receiptJson || "");
            }
            break;
          case "clipboard-write":
            if (typeof window.ChorusTraceWriteClipboardText === "function") {
              window.ChorusTraceWriteClipboardText(payload.clipboardText || "");
            }
            break;
        }
      }

      if (typeof window.Worker === "function") {
        var ChorusTraceOriginalWorker = window.Worker;
        window.Worker = function(scriptURL, options) {
          var worker = options === undefined
            ? new ChorusTraceOriginalWorker(scriptURL)
            : new ChorusTraceOriginalWorker(scriptURL, options);
          worker.addEventListener("message", handleChorusTraceWorkerBridgeMessage);
          return worker;
        };
        window.Worker.prototype = ChorusTraceOriginalWorker.prototype;
        Object.setPrototypeOf(window.Worker, ChorusTraceOriginalWorker);
      }

      function resizeDesktopCanvas() {
        if (!document.querySelector("#unity-container").classList.contains("unity-desktop")) {
          return;
        }

        var maxWidth = Math.max(720, Math.floor(window.innerWidth * 0.96));
        var maxHeight = Math.max(480, Math.floor(window.innerHeight * 0.86));
        var width = maxWidth;
        var height = Math.round(width / desktopAspect);

        if (height > maxHeight) {
          height = maxHeight;
          width = Math.round(height * desktopAspect);
        }

        canvas.style.width = width + "px";
        canvas.style.height = height + "px";
      }

      function scheduleDesktopCanvasResize() {
        if (chorusTraceDesktopCanvasResizeRequestId !== 0) {
          return;
        }

        chorusTraceDesktopCanvasResizeRequestId = window.requestAnimationFrame(function() {
          chorusTraceDesktopCanvasResizeRequestId = 0;
          resizeDesktopCanvas();
        });
      }

      function shouldReportToLocalPreflight() {
        return window.location.hostname === "127.0.0.1" || window.location.hostname === "localhost";
      }

      function hasConcreteChorusTraceUiScreen(uiScreen) {
        switch (uiScreen) {
          case "title":
          case "mode-select":
          case "gameplay":
          case "settings":
          case "result":
            return true;
          default:
            return false;
        }
      }

      function resolveChorusTraceLoadingCopy() {
        if (chorusTracePreflight.state === "unity-error") {
          return {
            status: "The chamber did not open.",
            helper: "Reload the page to try again."
          };
        }

        if (chorusTracePreflight.state === "unity-booted") {
          if (hasConcreteChorusTraceUiScreen(chorusTracePreflight.uiScreen)) {
            return {
              status: "The pattern is almost ready.",
              helper: "Stepping into the board."
            };
          }

          return {
            status: "Gathering the board and its echoes.",
            helper: "The first screen will appear as soon as it settles."
          };
        }

        if (chorusTracePreflight.state === "loader-requested") {
          return {
            status: "Waking the chorus.",
            helper: "Gathering seeds, echoes, and glass."
          };
        }

        return {
          status: "Preparing the chamber.",
          helper: "A short ritual is waking the board."
        };
      }

      function applyChorusTraceLoadingCopy() {
        var copy = resolveChorusTraceLoadingCopy();
        if (chorusTraceLoadingStatus) {
          chorusTraceLoadingStatus.textContent = copy.status;
        }

        if (chorusTraceLoadingHelper) {
          chorusTraceLoadingHelper.textContent = copy.helper;
        }
      }

      function clearChorusTraceLoadingShellVisibilityTimer() {
        if (chorusTraceLoadingShellVisibilityTimerId !== 0) {
          window.clearTimeout(chorusTraceLoadingShellVisibilityTimerId);
          chorusTraceLoadingShellVisibilityTimerId = 0;
        }
      }

      function showChorusTraceLoadingShell() {
        if (!chorusTraceLoadingBar) {
          return;
        }

        if (chorusTraceLoadingShellFadeTimerId !== 0) {
          window.clearTimeout(chorusTraceLoadingShellFadeTimerId);
          chorusTraceLoadingShellFadeTimerId = 0;
        }

        chorusTraceLoadingBar.style.display = "flex";
        chorusTraceLoadingBar.classList.remove("is-hiding");
        chorusTraceLoadingBar.setAttribute("aria-hidden", "false");
      }

      function hideChorusTraceLoadingShell() {
        if (!chorusTraceLoadingBar || chorusTraceLoadingShellFadeTimerId !== 0 || chorusTraceLoadingBar.style.display === "none") {
          return;
        }

        chorusTraceLoadingBar.classList.add("is-hiding");
        chorusTraceLoadingBar.setAttribute("aria-hidden", "true");
        chorusTraceLoadingShellFadeTimerId = window.setTimeout(function() {
          chorusTraceLoadingBar.style.display = "none";
          chorusTraceLoadingBar.classList.remove("is-hiding");
          chorusTraceLoadingShellFadeTimerId = 0;
        }, chorusTraceLoadingShellFadeDurationMs);
      }

      function syncChorusTraceLoadingShellVisibility() {
        applyChorusTraceLoadingCopy();
        if (!chorusTraceLoadingBar) {
          return;
        }

        clearChorusTraceLoadingShellVisibilityTimer();

        if (chorusTracePreflight.state === "unity-error") {
          showChorusTraceLoadingShell();
          return;
        }

        if (chorusTracePreflight.state !== "unity-booted") {
          showChorusTraceLoadingShell();
          return;
        }

        var now = Date.now();
        var minimumHideAtMs = chorusTraceLoadingShellFirstShownAtMs + chorusTraceLoadingShellMinimumVisibleMs;
        var concreteUiScreen = hasConcreteChorusTraceUiScreen(chorusTracePreflight.uiScreen);
        var readyHideAtMs = concreteUiScreen
          ? minimumHideAtMs
          : Math.max(minimumHideAtMs, chorusTraceLoadingShellBootedAtMs + chorusTraceLoadingShellBootGraceMs);

        if (now >= readyHideAtMs) {
          hideChorusTraceLoadingShell();
          return;
        }

        showChorusTraceLoadingShell();
        chorusTraceLoadingShellVisibilityTimerId = window.setTimeout(
          syncChorusTraceLoadingShellVisibility,
          Math.max(0, readyHideAtMs - now));
      }

      function shouldAllowReleaseSmoke() {
        return chorusTracePreflightParams.get("chorustrace_release_smoke") === "force-on";
      }

      function cloneSmokePoint(point) {
        if (!point || typeof point.x !== "number" || typeof point.y !== "number") {
          return null;
        }

        return {
          x: point.x,
          y: point.y
        };
      }

      function normalizeSmokeGeometry(rawGeometry) {
        if (!rawGeometry || typeof rawGeometry !== "object") {
          return null;
        }

        var boardStart = cloneSmokePoint(rawGeometry.boardStart);
        var boardOutside = cloneSmokePoint(rawGeometry.boardOutside);
        var partialStrokeEnd = cloneSmokePoint(rawGeometry.partialStrokeEnd);
        var boardBounds = cloneSmokeRect(rawGeometry.boardBounds);
        var gameplayPanel = cloneSmokeRect(rawGeometry.gameplayPanel);
        var topBar = cloneSmokeRect(rawGeometry.topBar);
        var bottomBar = cloneSmokeRect(rawGeometry.bottomBar);
        var instruction = cloneSmokeRect(rawGeometry.instruction);
        var moves = cloneSmokeRect(rawGeometry.moves);
        var targetProgress = cloneSmokeRect(rawGeometry.targetProgress);
        var status = cloneSmokeRect(rawGeometry.status);
        var dailyBadge = cloneSmokeLabelRect(rawGeometry.dailyBadge);
        var resultPanel = cloneSmokeVisualRect(rawGeometry.resultPanel);
        var continueButton = cloneSmokeLabelRect(rawGeometry.continueButton);
        var replayButton = cloneSmokeLabelRect(rawGeometry.replayButton);
        var helpButton = cloneSmokeLabelRect(rawGeometry.helpButton);
        var directionGuides = cloneSmokeGroupRect(rawGeometry.directionGuides);
        var replayTrace = cloneSmokeGroupRect(rawGeometry.replayTrace);
        if (!boardStart || !boardOutside || !partialStrokeEnd || !boardBounds || !gameplayPanel || !topBar || !bottomBar || !instruction || !moves || !targetProgress || !status || !dailyBadge || !resultPanel || !continueButton || !replayButton || !helpButton || !directionGuides || !replayTrace) {
          return null;
        }

        return {
          boardStart: boardStart,
          boardOutside: boardOutside,
          partialStrokeEnd: partialStrokeEnd,
          boardBounds: boardBounds,
          gameplayPanel: gameplayPanel,
          topBar: topBar,
          bottomBar: bottomBar,
          instruction: instruction,
          moves: moves,
          targetProgress: targetProgress,
          status: status,
          dailyBadge: dailyBadge,
          resultPanel: resultPanel,
          continueButton: continueButton,
          replayButton: replayButton,
          helpButton: helpButton,
          directionGuides: directionGuides,
          replayTrace: replayTrace
        };
      }

      function buildSmokeCommandStateSnapshot() {
        return {
          ui_screen: chorusTracePreflight.uiScreen || "unknown",
          game_mode: chorusTracePreflight.gameMode || "none",
          help_visible: !!chorusTracePreflight.helpVisible,
          guide_count: chorusTracePreflight.guideCount | 0,
          committed_gesture_count: chorusTracePreflight.committedGestureCount | 0,
          status_code: chorusTracePreflight.statusCode || "idle",
          status_text: chorusTracePreflight.statusText || "",
          snapshot_value: chorusTracePreflight.snapshotValue || "",
          tutorial_index: chorusTracePreflight.tutorialIndex | 0,
          instruction_text: chorusTracePreflight.instructionText || ""
        };
      }

      function buildFallbackSmokeCommandReceipt(requestId, command, reason) {
        var snapshot = buildSmokeCommandStateSnapshot();
        return {
          request_id: typeof requestId === "string" ? requestId : "",
          command: typeof command === "string" ? command : "",
          accepted: false,
          reason: typeof reason === "string" ? reason : "command-unacknowledged",
          ui_screen: snapshot.ui_screen,
          game_mode: snapshot.game_mode,
          help_visible: snapshot.help_visible,
          guide_count: snapshot.guide_count,
          committed_gesture_count: snapshot.committed_gesture_count,
          status_code: snapshot.status_code,
          status_text: snapshot.status_text,
          snapshot_value: snapshot.snapshot_value,
          tutorial_index: snapshot.tutorial_index,
          instruction_text: snapshot.instruction_text
        };
      }

      function createSmokeCommandRequestId() {
        chorusTraceSmokeCommandCounter += 1;
        return "smoke-" + Date.now().toString(36) + "-" + chorusTraceSmokeCommandCounter.toString(36);
      }

      function buildClipboardWriteStateSnapshot() {
        return {
          request_id: typeof chorusTraceClipboardWriteState.request_id === "string" ? chorusTraceClipboardWriteState.request_id : "",
          expected_text: typeof chorusTraceClipboardWriteState.expected_text === "string" ? chorusTraceClipboardWriteState.expected_text : "",
          status: typeof chorusTraceClipboardWriteState.status === "string" ? chorusTraceClipboardWriteState.status : "idle",
          completed: !!chorusTraceClipboardWriteState.completed,
          succeeded: !!chorusTraceClipboardWriteState.succeeded,
          method: typeof chorusTraceClipboardWriteState.method === "string" ? chorusTraceClipboardWriteState.method : "",
          failure_reason: typeof chorusTraceClipboardWriteState.failure_reason === "string" ? chorusTraceClipboardWriteState.failure_reason : "",
          started_at_ms: Number.isFinite(Number(chorusTraceClipboardWriteState.started_at_ms)) ? Number(chorusTraceClipboardWriteState.started_at_ms) : 0,
          completed_at_ms: Number.isFinite(Number(chorusTraceClipboardWriteState.completed_at_ms)) ? Number(chorusTraceClipboardWriteState.completed_at_ms) : 0
        };
      }

      function createClipboardWriteRequestId() {
        chorusTraceClipboardWriteCounter += 1;
        return "clipboard-" + Date.now().toString(36) + "-" + chorusTraceClipboardWriteCounter.toString(36);
      }

      function beginClipboardWrite(text) {
        var requestId = createClipboardWriteRequestId();
        chorusTraceClipboardWriteState = {
          request_id: requestId,
          expected_text: text,
          status: "pending",
          completed: false,
          succeeded: false,
          method: "",
          failure_reason: "",
          started_at_ms: Date.now(),
          completed_at_ms: 0
        };
        return requestId;
      }

      function finishClipboardWrite(requestId, succeeded, method, failureReason) {
        if (!chorusTraceClipboardWriteState || chorusTraceClipboardWriteState.request_id !== requestId) {
          return buildClipboardWriteStateSnapshot();
        }

        chorusTraceClipboardWriteState = {
          request_id: requestId,
          expected_text: chorusTraceClipboardWriteState.expected_text,
          status: succeeded ? "succeeded" : "failed",
          completed: true,
          succeeded: !!succeeded,
          method: typeof method === "string" ? method : "",
          failure_reason: typeof failureReason === "string" ? failureReason : "",
          started_at_ms: chorusTraceClipboardWriteState.started_at_ms,
          completed_at_ms: Date.now()
        };
        return buildClipboardWriteStateSnapshot();
      }

      function getClipboardErrorText(error) {
        if (!error) {
          return "";
        }

        if (typeof error === "string") {
          return error;
        }

        if (typeof error.message === "string" && error.message.length > 0) {
          return error.message;
        }

        try {
          return String(error);
        } catch (stringifyError) {
          return "unknown-error";
        }
      }

      function tryExecClipboardFallback(text) {
        var textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.setAttribute("readonly", "readonly");
        textarea.style.position = "fixed";
        textarea.style.opacity = "0";
        textarea.style.pointerEvents = "none";
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();

        try {
          return document.execCommand("copy");
        } catch (error) {
          return false;
        } finally {
          document.body.removeChild(textarea);
        }
      }

      function writeClipboardText(text) {
        if (typeof text !== "string" || text.length === 0) {
          return Promise.resolve(buildClipboardWriteStateSnapshot());
        }

        var requestId = beginClipboardWrite(text);
        function markClipboardWriteSuccess(method) {
          return finishClipboardWrite(requestId, true, method, "");
        }

        function markClipboardWriteFailure(method, failureReason) {
          var normalizedReason = typeof failureReason === "string" && failureReason.length > 0
            ? failureReason
            : "clipboard-write-failed";
          return finishClipboardWrite(requestId, false, method, normalizedReason);
        }

        function tryClipboardFallback(initialReason) {
          try {
            if (tryExecClipboardFallback(text)) {
              return markClipboardWriteSuccess("execCommand-fallback");
            }

            return markClipboardWriteFailure("execCommand-fallback", initialReason || "execCommand-copy-failed");
          } catch (fallbackError) {
            var fallbackReason = getClipboardErrorText(fallbackError);
            return markClipboardWriteFailure(
              "execCommand-fallback",
              fallbackReason || initialReason || "execCommand-copy-failed");
          }
        }

        if (navigator.clipboard && typeof navigator.clipboard.writeText === "function") {
          return navigator.clipboard.writeText(text).then(function() {
            return markClipboardWriteSuccess("navigator.clipboard.writeText");
          }).catch(function(error) {
            return tryClipboardFallback(getClipboardErrorText(error) || "navigator.clipboard.writeText failed");
          });
        }

        return Promise.resolve(tryClipboardFallback("navigator.clipboard-unavailable"));
      }

      function parseSmokeCommandReceipt(receiptJson) {
        if (typeof receiptJson !== "string" || receiptJson.length === 0) {
          return null;
        }

        try {
          var parsed = JSON.parse(receiptJson);
          if (!parsed || typeof parsed !== "object") {
            return null;
          }

          return {
            request_id: typeof parsed.request_id === "string" ? parsed.request_id : "",
            command: typeof parsed.command === "string" ? parsed.command : "",
            accepted: !!parsed.accepted,
            reason: typeof parsed.reason === "string" ? parsed.reason : "",
            ui_screen: typeof parsed.ui_screen === "string" ? parsed.ui_screen : "unknown",
            game_mode: typeof parsed.game_mode === "string" ? parsed.game_mode : "none",
            help_visible: !!parsed.help_visible,
            guide_count: Number.isFinite(Number(parsed.guide_count)) ? Math.max(0, Number(parsed.guide_count) | 0) : 0,
            committed_gesture_count: Number.isFinite(Number(parsed.committed_gesture_count)) ? Math.max(0, Number(parsed.committed_gesture_count) | 0) : 0,
            status_code: typeof parsed.status_code === "string" && parsed.status_code.length > 0 ? parsed.status_code : "idle",
            status_text: typeof parsed.status_text === "string" ? parsed.status_text : "",
            snapshot_value: typeof parsed.snapshot_value === "string" ? parsed.snapshot_value : "",
            tutorial_index: Number.isFinite(Number(parsed.tutorial_index)) ? Math.max(-1, Number(parsed.tutorial_index) | 0) : -1,
            instruction_text: typeof parsed.instruction_text === "string" ? parsed.instruction_text : ""
          };
        } catch (error) {
          return null;
        }
      }

      function convertUnityScreenPointToViewport(point) {
        if (!point) {
          return null;
        }

        var rect = canvas.getBoundingClientRect();
        var width = canvas.width || rect.width || 1;
        var height = canvas.height || rect.height || 1;
        return {
          x: rect.left + (point.x * rect.width / width),
          y: rect.top + ((height - point.y) * rect.height / height)
        };
      }

      function cloneSmokeRect(rect) {
        if (!rect || typeof rect.minX !== "number" || typeof rect.minY !== "number" || typeof rect.maxX !== "number" || typeof rect.maxY !== "number") {
          return null;
        }

        return {
          minX: rect.minX,
          minY: rect.minY,
          maxX: rect.maxX,
          maxY: rect.maxY
        };
      }

      function cloneSmokeLabelRect(labelRect) {
        if (!labelRect || typeof labelRect !== "object") {
          return null;
        }

        var rect = cloneSmokeRect(labelRect.rect);
        return {
          visible: !!labelRect.visible,
          text: typeof labelRect.text === "string" ? labelRect.text : "",
          rect: rect
        };

        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "ChorusTrace",
        productVersion: "1.0",
        showBanner: unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement("meta");
        meta.name = "viewport";
        meta.content = "width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes";
        document.getElementsByTagName("head")[0].appendChild(meta);
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";

      } else {
        scheduleDesktopCanvasResize();
        window.addEventListener("resize", scheduleDesktopCanvasResize);
        window.addEventListener("orientationchange", scheduleDesktopCanvasResize);
      }

      showChorusTraceLoadingShell();
      setChorusTracePreflightState("loader-requested");

      var script = document.createElement("script");
      script.onerror = () => {
        setChorusTracePreflightState("unity-error", "loader-script");
      };
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          chorusTraceUnityInstance = unityInstance;
          setChorusTracePreflightState("unity-booted");
          document.querySelector("#unity-fullscreen-button").onclick = () => {
            unityInstance.SetFullscreen(1);
          };

        }).catch((message) => {
          setChorusTracePreflightState("unity-error", String(message));
          alert(message);
        });
      };

      document.body.appendChild(script);
    </script>
  </body>
</html>
