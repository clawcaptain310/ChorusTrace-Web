<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | ChorusTrace</title>
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <div id="chorustrace-preflight-status" data-state="shell" data-interaction-seen="false" data-audio-state="unknown" data-ui-screen="unknown" data-game-mode="none" data-help-visible="false" data-guide-count="0" data-level-seed="" data-preflight-phase="boot" data-status-text="" data-is-drawing="false" data-committed-gesture-count="0" hidden></div>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo">Chorus Trace</div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"></div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer">Unity Web</div>
        <div id="unity-fullscreen-button" aria-label="Fullscreen"></div>
        <div id="unity-build-title">ChorusTrace</div>
      </div>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var chorusTracePreflightNode = document.querySelector("#chorustrace-preflight-status");
      var chorusTracePreflightParams = new URLSearchParams(window.location.search);
      var desktopAspect = 960 / 600;
      var chorusTracePreflight = {
        state: "shell",
        details: "",
        interactionSeen: false,
        audioState: "unknown",
        uiScreen: "unknown",
        gameMode: "none",
        helpVisible: false,
        guideCount: 0,
        levelSeed: "",
        preflightPhase: "boot",
        statusText: "",
        isDrawing: false,
        committedGestureCount: 0,
        snapshotValue: ""
      };
      var chorusTraceSmokeGeometry = null;
      var chorusTracePendingInteractionCount = 0;
      var chorusTracePendingSmokeCommands = Object.create(null);
      var chorusTraceLastSmokeCommandReceipt = null;
      var chorusTraceSmokeCommandCounter = 0;
      var chorusTraceClipboardWriteCounter = 0;
      var chorusTraceClipboardWriteState = {
        request_id: "",
        expected_text: "",
        status: "idle",
        completed: false,
        succeeded: false,
        method: "",
        failure_reason: "",
        started_at_ms: 0,
        completed_at_ms: 0
      };
      var chorusTraceUnityInstance = null;
      var chorusTraceAutoAudioUnlockEnabled = shouldReportToLocalPreflight() &&
        chorusTracePreflightParams.get("chorustrace_preflight_audio_automation") === "auto";
      var chorusTraceAutoAudioUnlockScheduled = false;

      function handleChorusTraceWorkerBridgeMessage(event) {
        var data = event && event.data ? event.data : null;
        if (!data || !data.__chorustrace_preflight_bridge || !data.payload) {
          return;
        }

        var payload = data.payload;
        switch (data.type) {
          case "audio-state":
            if (typeof window.ChorusTraceSetAudioPreflightState === "function") {
              window.ChorusTraceSetAudioPreflightState(payload.audioState | 0);
            }
            break;
          case "gameplay-state":
            if (typeof window.ChorusTraceSetGameplayPreflightState === "function") {
              window.ChorusTraceSetGameplayPreflightState(
                payload.uiScreen || "",
                payload.gameMode || "",
                payload.helpVisible | 0,
                payload.guideCount | 0,
                payload.levelSeed || "",
                payload.preflightPhase || "");
            }
            break;
          case "smoke-telemetry":
            if (typeof window.ChorusTraceSetSmokeTelemetry === "function") {
              window.ChorusTraceSetSmokeTelemetry(
                payload.statusText || "",
                payload.isDrawing | 0,
                payload.committedGestureCount | 0,
                payload.geometryJson || "",
                payload.snapshotValue || "");
            }
            break;
          case "smoke-command-receipt":
            if (typeof window.ChorusTraceSetSmokeCommandReceipt === "function") {
              window.ChorusTraceSetSmokeCommandReceipt(payload.receiptJson || "");
            }
            break;
          case "clipboard-write":
            if (typeof window.ChorusTraceWriteClipboardText === "function") {
              window.ChorusTraceWriteClipboardText(payload.clipboardText || "");
            }
            break;
        }
      }

      if (typeof window.Worker === "function") {
        var ChorusTraceOriginalWorker = window.Worker;
        window.Worker = function(scriptURL, options) {
          var worker = options === undefined
            ? new ChorusTraceOriginalWorker(scriptURL)
            : new ChorusTraceOriginalWorker(scriptURL, options);
          worker.addEventListener("message", handleChorusTraceWorkerBridgeMessage);
          return worker;
        };
        window.Worker.prototype = ChorusTraceOriginalWorker.prototype;
        Object.setPrototypeOf(window.Worker, ChorusTraceOriginalWorker);
      }

      function resizeDesktopCanvas() {
        if (!document.querySelector("#unity-container").classList.contains("unity-desktop")) {
          return;
        }

        var maxWidth = Math.max(720, Math.floor(window.innerWidth * 0.96));
        var maxHeight = Math.max(480, Math.floor(window.innerHeight * 0.86));
        var width = maxWidth;
        var height = Math.round(width / desktopAspect);

        if (height > maxHeight) {
          height = maxHeight;
          width = Math.round(height * desktopAspect);
        }

        canvas.style.width = width + "px";
        canvas.style.height = height + "px";
      }

      function shouldReportToLocalPreflight() {
        return window.location.hostname === "127.0.0.1" || window.location.hostname === "localhost";
      }

      function shouldAllowReleaseSmoke() {
        return chorusTracePreflightParams.get("chorustrace_release_smoke") === "force-on";
      }

      function cloneSmokePoint(point) {
        if (!point || typeof point.x !== "number" || typeof point.y !== "number") {
          return null;
        }

        return {
          x: point.x,
          y: point.y
        };
      }

      function normalizeSmokeGeometry(rawGeometry) {
        if (!rawGeometry || typeof rawGeometry !== "object") {
          return null;
        }

        var boardStart = cloneSmokePoint(rawGeometry.boardStart);
        var boardOutside = cloneSmokePoint(rawGeometry.boardOutside);
        var partialStrokeEnd = cloneSmokePoint(rawGeometry.partialStrokeEnd);
        if (!boardStart || !boardOutside || !partialStrokeEnd) {
          return null;
        }

        return {
          boardStart: boardStart,
          boardOutside: boardOutside,
          partialStrokeEnd: partialStrokeEnd
        };
      }

      function buildSmokeCommandStateSnapshot() {
        return {
          ui_screen: chorusTracePreflight.uiScreen || "unknown",
          game_mode: chorusTracePreflight.gameMode || "none",
          help_visible: !!chorusTracePreflight.helpVisible,
          guide_count: chorusTracePreflight.guideCount | 0,
          committed_gesture_count: chorusTracePreflight.committedGestureCount | 0,
          status_text: chorusTracePreflight.statusText || "",
          snapshot_value: chorusTracePreflight.snapshotValue || ""
        };
      }

      function buildFallbackSmokeCommandReceipt(requestId, command, reason) {
        var snapshot = buildSmokeCommandStateSnapshot();
        return {
          request_id: typeof requestId === "string" ? requestId : "",
          command: typeof command === "string" ? command : "",
          accepted: false,
          reason: typeof reason === "string" ? reason : "command-unacknowledged",
          ui_screen: snapshot.ui_screen,
          game_mode: snapshot.game_mode,
          help_visible: snapshot.help_visible,
          guide_count: snapshot.guide_count,
          committed_gesture_count: snapshot.committed_gesture_count,
          status_text: snapshot.status_text,
          snapshot_value: snapshot.snapshot_value
        };
      }

      function createSmokeCommandRequestId() {
        chorusTraceSmokeCommandCounter += 1;
        return "smoke-" + Date.now().toString(36) + "-" + chorusTraceSmokeCommandCounter.toString(36);
      }

      function buildClipboardWriteStateSnapshot() {
        return {
          request_id: typeof chorusTraceClipboardWriteState.request_id === "string" ? chorusTraceClipboardWriteState.request_id : "",
          expected_text: typeof chorusTraceClipboardWriteState.expected_text === "string" ? chorusTraceClipboardWriteState.expected_text : "",
          status: typeof chorusTraceClipboardWriteState.status === "string" ? chorusTraceClipboardWriteState.status : "idle",
          completed: !!chorusTraceClipboardWriteState.completed,
          succeeded: !!chorusTraceClipboardWriteState.succeeded,
          method: typeof chorusTraceClipboardWriteState.method === "string" ? chorusTraceClipboardWriteState.method : "",
          failure_reason: typeof chorusTraceClipboardWriteState.failure_reason === "string" ? chorusTraceClipboardWriteState.failure_reason : "",
          started_at_ms: Number.isFinite(Number(chorusTraceClipboardWriteState.started_at_ms)) ? Number(chorusTraceClipboardWriteState.started_at_ms) : 0,
          completed_at_ms: Number.isFinite(Number(chorusTraceClipboardWriteState.completed_at_ms)) ? Number(chorusTraceClipboardWriteState.completed_at_ms) : 0
        };
      }

      function createClipboardWriteRequestId() {
        chorusTraceClipboardWriteCounter += 1;
        return "clipboard-" + Date.now().toString(36) + "-" + chorusTraceClipboardWriteCounter.toString(36);
      }

      function beginClipboardWrite(text) {
        var requestId = createClipboardWriteRequestId();
        chorusTraceClipboardWriteState = {
          request_id: requestId,
          expected_text: text,
          status: "pending",
          completed: false,
          succeeded: false,
          method: "",
          failure_reason: "",
          started_at_ms: Date.now(),
          completed_at_ms: 0
        };
        return requestId;
      }

      function finishClipboardWrite(requestId, succeeded, method, failureReason) {
        if (!chorusTraceClipboardWriteState || chorusTraceClipboardWriteState.request_id !== requestId) {
          return buildClipboardWriteStateSnapshot();
        }

        chorusTraceClipboardWriteState = {
          request_id: requestId,
          expected_text: chorusTraceClipboardWriteState.expected_text,
          status: succeeded ? "succeeded" : "failed",
          completed: true,
          succeeded: !!succeeded,
          method: typeof method === "string" ? method : "",
          failure_reason: typeof failureReason === "string" ? failureReason : "",
          started_at_ms: chorusTraceClipboardWriteState.started_at_ms,
          completed_at_ms: Date.now()
        };
        return buildClipboardWriteStateSnapshot();
      }

      function getClipboardErrorText(error) {
        if (!error) {
          return "";
        }

        if (typeof error === "string") {
          return error;
        }

        if (typeof error.message === "string" && error.message.length > 0) {
          return error.message;
        }

        try {
          return String(error);
        } catch (stringifyError) {
          return "unknown-error";
        }
      }

      function tryExecClipboardFallback(text) {
        var textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.setAttribute("readonly", "readonly");
        textarea.style.position = "fixed";
        textarea.style.opacity = "0";
        textarea.style.pointerEvents = "none";
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();

        try {
          return document.execCommand("copy");
        } catch (error) {
          return false;
        } finally {
          document.body.removeChild(textarea);
        }
      }

      function writeClipboardText(text) {
        if (typeof text !== "string" || text.length === 0) {
          return Promise.resolve(buildClipboardWriteStateSnapshot());
        }

        var requestId = beginClipboardWrite(text);
        function markClipboardWriteSuccess(method) {
          return finishClipboardWrite(requestId, true, method, "");
        }

        function markClipboardWriteFailure(method, failureReason) {
          var normalizedReason = typeof failureReason === "string" && failureReason.length > 0
            ? failureReason
            : "clipboard-write-failed";
          return finishClipboardWrite(requestId, false, method, normalizedReason);
        }

        function tryClipboardFallback(initialReason) {
          try {
            if (tryExecClipboardFallback(text)) {
              return markClipboardWriteSuccess("execCommand-fallback");
            }

            return markClipboardWriteFailure("execCommand-fallback", initialReason || "execCommand-copy-failed");
          } catch (fallbackError) {
            var fallbackReason = getClipboardErrorText(fallbackError);
            return markClipboardWriteFailure(
              "execCommand-fallback",
              fallbackReason || initialReason || "execCommand-copy-failed");
          }
        }

        if (navigator.clipboard && typeof navigator.clipboard.writeText === "function") {
          return navigator.clipboard.writeText(text).then(function() {
            return markClipboardWriteSuccess("navigator.clipboard.writeText");
          }).catch(function(error) {
            return tryClipboardFallback(getClipboardErrorText(error) || "navigator.clipboard.writeText failed");
          });
        }

        return Promise.resolve(tryClipboardFallback("navigator.clipboard-unavailable"));
      }

      function parseSmokeCommandReceipt(receiptJson) {
        if (typeof receiptJson !== "string" || receiptJson.length === 0) {
          return null;
        }

        try {
          var parsed = JSON.parse(receiptJson);
          if (!parsed || typeof parsed !== "object") {
            return null;
          }

          return {
            request_id: typeof parsed.request_id === "string" ? parsed.request_id : "",
            command: typeof parsed.command === "string" ? parsed.command : "",
            accepted: !!parsed.accepted,
            reason: typeof parsed.reason === "string" ? parsed.reason : "",
            ui_screen: typeof parsed.ui_screen === "string" ? parsed.ui_screen : "unknown",
            game_mode: typeof parsed.game_mode === "string" ? parsed.game_mode : "none",
            help_visible: !!parsed.help_visible,
            guide_count: Number.isFinite(Number(parsed.guide_count)) ? Math.max(0, Number(parsed.guide_count) | 0) : 0,
            committed_gesture_count: Number.isFinite(Number(parsed.committed_gesture_count)) ? Math.max(0, Number(parsed.committed_gesture_count) | 0) : 0,
            status_text: typeof parsed.status_text === "string" ? parsed.status_text : "",
            snapshot_value: typeof parsed.snapshot_value === "string" ? parsed.snapshot_value : ""
          };
        } catch (error) {
          return null;
        }
      }

      function convertUnityScreenPointToViewport(point) {
        if (!point) {
          return null;
        }

        var rect = canvas.getBoundingClientRect();
        var width = canvas.width || rect.width || 1;
        var height = canvas.height || rect.height || 1;
        return {
          x: rect.left + (point.x * rect.width / width),
          y: rect.top + ((height - point.y) * rect.height / height)
        };
      }

      function updateChorusTracePreflight(patch) {
        if (Object.prototype.hasOwnProperty.call(patch, "state")) {
          chorusTracePreflight.state = patch.state;
        }

        if (Object.prototype.hasOwnProperty.call(patch, "details")) {
          chorusTracePreflight.details = typeof patch.details === "string" ? patch.details : "";
        }

        if (Object.prototype.hasOwnProperty.call(patch, "interaction_seen")) {
          chorusTracePreflight.interactionSeen = !!patch.interaction_seen;
        }

        if (Object.prototype.hasOwnProperty.call(patch, "audio_state")) {
          chorusTracePreflight.audioState = patch.audio_state || "unknown";
        }

        if (Object.prototype.hasOwnProperty.call(patch, "ui_screen")) {
          chorusTracePreflight.uiScreen = patch.ui_screen || "unknown";
        }

        if (Object.prototype.hasOwnProperty.call(patch, "game_mode")) {
          chorusTracePreflight.gameMode = patch.game_mode || "none";
        }

        if (Object.prototype.hasOwnProperty.call(patch, "help_visible")) {
          chorusTracePreflight.helpVisible = !!patch.help_visible;
        }

        if (Object.prototype.hasOwnProperty.call(patch, "guide_count")) {
          var parsedGuideCount = Number.parseInt(patch.guide_count, 10);
          chorusTracePreflight.guideCount = Number.isFinite(parsedGuideCount) ? Math.max(0, parsedGuideCount) : 0;
        }

        if (Object.prototype.hasOwnProperty.call(patch, "level_seed")) {
          chorusTracePreflight.levelSeed = typeof patch.level_seed === "string" ? patch.level_seed : "";
        }

        if (Object.prototype.hasOwnProperty.call(patch, "preflight_phase")) {
          chorusTracePreflight.preflightPhase = typeof patch.preflight_phase === "string" && patch.preflight_phase.length > 0
            ? patch.preflight_phase
            : "boot";
        }

        if (Object.prototype.hasOwnProperty.call(patch, "status_text")) {
          chorusTracePreflight.statusText = typeof patch.status_text === "string" ? patch.status_text : "";
        }

        if (Object.prototype.hasOwnProperty.call(patch, "is_drawing")) {
          chorusTracePreflight.isDrawing = !!patch.is_drawing;
        }

        if (Object.prototype.hasOwnProperty.call(patch, "committed_gesture_count")) {
          var parsedGestureCount = Number.parseInt(patch.committed_gesture_count, 10);
          chorusTracePreflight.committedGestureCount = Number.isFinite(parsedGestureCount) ? Math.max(0, parsedGestureCount) : 0;
        }

        if (Object.prototype.hasOwnProperty.call(patch, "snapshot_value")) {
          chorusTracePreflight.snapshotValue = typeof patch.snapshot_value === "string" ? patch.snapshot_value : "";
        }

        if (chorusTracePreflightNode) {
          chorusTracePreflightNode.setAttribute("data-state", chorusTracePreflight.state);
          chorusTracePreflightNode.setAttribute("data-interaction-seen", chorusTracePreflight.interactionSeen ? "true" : "false");
          chorusTracePreflightNode.setAttribute("data-audio-state", chorusTracePreflight.audioState);
          chorusTracePreflightNode.setAttribute("data-ui-screen", chorusTracePreflight.uiScreen);
          chorusTracePreflightNode.setAttribute("data-game-mode", chorusTracePreflight.gameMode);
          chorusTracePreflightNode.setAttribute("data-help-visible", chorusTracePreflight.helpVisible ? "true" : "false");
          chorusTracePreflightNode.setAttribute("data-guide-count", String(chorusTracePreflight.guideCount));
          chorusTracePreflightNode.setAttribute("data-level-seed", chorusTracePreflight.levelSeed);
          chorusTracePreflightNode.setAttribute("data-preflight-phase", chorusTracePreflight.preflightPhase);
          chorusTracePreflightNode.setAttribute("data-status-text", chorusTracePreflight.statusText);
          chorusTracePreflightNode.setAttribute("data-is-drawing", chorusTracePreflight.isDrawing ? "true" : "false");
          chorusTracePreflightNode.setAttribute("data-committed-gesture-count", String(chorusTracePreflight.committedGestureCount));
          if (chorusTracePreflight.snapshotValue.length > 0) {
            chorusTracePreflightNode.setAttribute("data-snapshot-value", chorusTracePreflight.snapshotValue);
          } else {
            chorusTracePreflightNode.removeAttribute("data-snapshot-value");
          }
          if (chorusTracePreflight.details.length > 0) {
            chorusTracePreflightNode.setAttribute("data-details", chorusTracePreflight.details);
          } else {
            chorusTracePreflightNode.removeAttribute("data-details");
          }
        }

        if (!shouldReportToLocalPreflight()) {
          maybeScheduleAutoAudioUnlockInteraction();
          return;
        }

        var requestParams = [];
        if (Object.prototype.hasOwnProperty.call(patch, "state")) {
          requestParams.push("state=" + encodeURIComponent(chorusTracePreflight.state));
        }

        if (Object.prototype.hasOwnProperty.call(patch, "details")) {
          requestParams.push("details=" + encodeURIComponent(chorusTracePreflight.details));
        }

        if (Object.prototype.hasOwnProperty.call(patch, "interaction_seen")) {
          requestParams.push("interaction_seen=" + encodeURIComponent(chorusTracePreflight.interactionSeen ? "true" : "false"));
        }

        if (Object.prototype.hasOwnProperty.call(patch, "audio_state")) {
          requestParams.push("audio_state=" + encodeURIComponent(chorusTracePreflight.audioState));
        }

        if (Object.prototype.hasOwnProperty.call(patch, "ui_screen")) {
          requestParams.push("ui_screen=" + encodeURIComponent(chorusTracePreflight.uiScreen));
        }

        if (Object.prototype.hasOwnProperty.call(patch, "game_mode")) {
          requestParams.push("game_mode=" + encodeURIComponent(chorusTracePreflight.gameMode));
        }

        if (Object.prototype.hasOwnProperty.call(patch, "help_visible")) {
          requestParams.push("help_visible=" + encodeURIComponent(chorusTracePreflight.helpVisible ? "true" : "false"));
        }

        if (Object.prototype.hasOwnProperty.call(patch, "guide_count")) {
          requestParams.push("guide_count=" + encodeURIComponent(String(chorusTracePreflight.guideCount)));
        }

        if (Object.prototype.hasOwnProperty.call(patch, "level_seed")) {
          requestParams.push("level_seed=" + encodeURIComponent(chorusTracePreflight.levelSeed));
        }

        if (Object.prototype.hasOwnProperty.call(patch, "preflight_phase")) {
          requestParams.push("preflight_phase=" + encodeURIComponent(chorusTracePreflight.preflightPhase));
        }

        if (requestParams.length === 0) {
          return;
        }

        var requestUrl = "/__chorustrace_preflight?" + requestParams.join("&");
        fetch(requestUrl, { method: "GET", cache: "no-store" }).catch(() => {});
        maybeScheduleAutoAudioUnlockInteraction();
      }

      function maybeScheduleAutoAudioUnlockInteraction() {
        if (!chorusTraceAutoAudioUnlockEnabled || chorusTraceAutoAudioUnlockScheduled || chorusTracePreflight.interactionSeen) {
          return;
        }

        if (chorusTracePreflight.audioState !== "locked") {
          return;
        }

        var preflightSequence = chorusTracePreflightParams.get("chorustrace_preflight_sequence");
        var requiresLifecycle = preflightSequence === "help-lifecycle" || preflightSequence === "help-replay";
        if (requiresLifecycle) {
          if (chorusTracePreflight.preflightPhase !== "after-reset") {
            return;
          }
        } else if (chorusTracePreflight.state !== "unity-booted") {
          return;
        }

        chorusTraceAutoAudioUnlockScheduled = true;
        window.setTimeout(function() {
          markChorusTraceInteractionSeen();
        }, 1500);
      }

      function setChorusTracePreflightState(state, details) {
        updateChorusTracePreflight({
          state: state,
          details: typeof details === "string" ? details : ""
        });
      }

      function markChorusTraceInteractionSeen() {
        chorusTracePendingInteractionCount += 1;
        if (chorusTracePreflight.interactionSeen) {
          return;
        }

        updateChorusTracePreflight({ interaction_seen: true });
      }

      function mapChorusTraceAudioState(audioState) {
        switch (audioState | 0) {
          case 1:
            return "locked";
          case 2:
            return "unlocked";
          case 3:
            return "disabled";
          default:
            return "unknown";
        }
      }

      window.ChorusTraceSetAudioPreflightState = function(audioState) {
        updateChorusTracePreflight({ audio_state: mapChorusTraceAudioState(audioState) });
      };

      window.ChorusTraceSetGameplayPreflightState = function(uiScreen, gameMode, helpVisible, guideCount, levelSeed, preflightPhase) {
        updateChorusTracePreflight({
          ui_screen: typeof uiScreen === "string" ? uiScreen : "unknown",
          game_mode: typeof gameMode === "string" ? gameMode : "none",
          help_visible: (helpVisible | 0) !== 0,
          guide_count: guideCount | 0,
          level_seed: typeof levelSeed === "string" ? levelSeed : "",
          preflight_phase: typeof preflightPhase === "string" ? preflightPhase : "boot"
        });
      };

      window.ChorusTraceSetSmokeTelemetry = function(statusText, isDrawing, committedGestureCount, geometryJson, snapshotValue) {
        var parsedGeometry = null;
        if (typeof geometryJson === "string" && geometryJson.length > 0) {
          try {
            parsedGeometry = JSON.parse(geometryJson);
          } catch (error) {
            parsedGeometry = null;
          }
        }

        chorusTraceSmokeGeometry = normalizeSmokeGeometry(parsedGeometry);
        updateChorusTracePreflight({
          status_text: typeof statusText === "string" ? statusText : "",
          is_drawing: (isDrawing | 0) !== 0,
          committed_gesture_count: committedGestureCount | 0,
          snapshot_value: typeof snapshotValue === "string" ? snapshotValue : ""
        });
      };

      window.ChorusTraceSetSmokeCommandReceipt = function(receiptJson) {
        var receipt = parseSmokeCommandReceipt(receiptJson);
        if (!receipt) {
          return;
        }

        chorusTraceLastSmokeCommandReceipt = receipt;
        if (!receipt.request_id) {
          return;
        }

        var pending = chorusTracePendingSmokeCommands[receipt.request_id];
        if (!pending) {
          return;
        }

        window.clearTimeout(pending.timeoutId);
        delete chorusTracePendingSmokeCommands[receipt.request_id];
        pending.resolve(receipt);
      };

      window.ChorusTraceGetLastSmokeCommandReceipt = function() {
        return chorusTraceLastSmokeCommandReceipt;
      };

      window.ChorusTraceGetClipboardWriteState = function() {
        return buildClipboardWriteStateSnapshot();
      };

      window.ChorusTraceWriteClipboardText = function(text) {
        return writeClipboardText(text);
      };

      window.ChorusTraceInvokeSmokeCommand = function(command) {
        return new Promise(function(resolve) {
          if (!shouldAllowReleaseSmoke()) {
            resolve(buildFallbackSmokeCommandReceipt("", "", "release-smoke-disabled"));
            return;
          }

          if (!chorusTraceUnityInstance || typeof chorusTraceUnityInstance.SendMessage !== "function") {
            resolve(buildFallbackSmokeCommandReceipt("", "", "unity-instance-unavailable"));
            return;
          }

          var normalizedCommand = typeof command === "string" ? command.trim() : "";
          if (!normalizedCommand) {
            resolve(buildFallbackSmokeCommandReceipt("", "", "command-required"));
            return;
          }

          var requestId = createSmokeCommandRequestId();
          var timeoutId = window.setTimeout(function() {
            delete chorusTracePendingSmokeCommands[requestId];
            resolve(buildFallbackSmokeCommandReceipt(requestId, normalizedCommand, "command-unacknowledged"));
          }, 5000);
          var envelopeJson = JSON.stringify({
            request_id: requestId,
            command: normalizedCommand
          });
          chorusTracePendingSmokeCommands[requestId] = {
            resolve: resolve,
            timeoutId: timeoutId
          };

          try {
            chorusTraceUnityInstance.SendMessage("ChorusTraceAppHost", "ForwardWebSmokeCommand", envelopeJson);
          } catch (error) {
            window.clearTimeout(timeoutId);
            delete chorusTracePendingSmokeCommands[requestId];
            resolve(buildFallbackSmokeCommandReceipt(requestId, normalizedCommand, String(error)));
          }
        });
      };

      window.ChorusTraceGetSmokeGeometry = function() {
        if (!chorusTraceSmokeGeometry) {
          return null;
        }

        return {
          boardStart: convertUnityScreenPointToViewport(chorusTraceSmokeGeometry.boardStart),
          boardOutside: convertUnityScreenPointToViewport(chorusTraceSmokeGeometry.boardOutside),
          partialStrokeEnd: convertUnityScreenPointToViewport(chorusTraceSmokeGeometry.partialStrokeEnd)
        };
      };

      window.ChorusTraceConsumePendingInteractionSignal = function() {
        if (chorusTracePendingInteractionCount < 1) {
          return 0;
        }

        chorusTracePendingInteractionCount = 0;
        return 1;
      };

      document.addEventListener("pointerdown", markChorusTraceInteractionSeen, true);
      document.addEventListener("touchstart", markChorusTraceInteractionSeen, true);
      document.addEventListener("keydown", markChorusTraceInteractionSeen, true);

      setChorusTracePreflightState("shell");

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? "block" : "none";
        }
        var div = document.createElement("div");
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == "error") div.style = "background: rgba(175, 57, 57, 0.92); padding: 10px;";
        else {
          if (type == "warning") div.style = "background: rgba(214, 159, 59, 0.92); padding: 10px;";
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/WebPages.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/WebPages.data.unityweb",
        frameworkUrl: buildUrl + "/WebPages.framework.js.unityweb",
        codeUrl: buildUrl + "/WebPages.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "ChorusTrace",
        productVersion: "1.0",
        showBanner: unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement("meta");
        meta.name = "viewport";
        meta.content = "width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes";
        document.getElementsByTagName("head")[0].appendChild(meta);
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";

      } else {
        resizeDesktopCanvas();
        window.addEventListener("resize", resizeDesktopCanvas);
      }

      document.querySelector("#unity-loading-bar").style.display = "block";
      setChorusTracePreflightState("loader-requested");

      var script = document.createElement("script");
      script.onerror = () => {
        setChorusTracePreflightState("unity-error", "loader-script");
      };
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          chorusTraceUnityInstance = unityInstance;
          setChorusTracePreflightState("unity-booted");
          document.querySelector("#unity-loading-bar").style.display = "none";
          document.querySelector("#unity-fullscreen-button").onclick = () => {
            unityInstance.SetFullscreen(1);
          };

        }).catch((message) => {
          setChorusTracePreflightState("unity-error", String(message));
          alert(message);
        });
      };

      document.body.appendChild(script);
    </script>
  </body>
</html>
